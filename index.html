<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroAI</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:20px;
    width:350px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    background:#7c3aed;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>✨ AstroAI</h2>

<input type="date">

<input type="time">

<input placeholder="Doğum Şehri">

<button>Haritamı Oluştur</button>

</div>

</body>
</html>
