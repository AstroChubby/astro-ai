<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroChubby</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(180deg,#050816,#0b1026,#170b35);

overflow:hidden;

color:white;

}

/* Yıldızlar */

.stars{

position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px),
radial-gradient(#b8b8ff 1px, transparent 1px);

background-size:
180px 180px,
250px 250px,
320px 320px;

animation:moveStars 90s linear infinite;

opacity:.9;

}

@keyframes moveStars{

from{
transform:translateY(0px);
}

to{
transform:translateY(-600px);
}

}

/* Kart */

.card{

position:relative;

width:90%;
max-width:420px;

padding:35px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:25px;

border:1px solid rgba(255,255,255,.15);

box-shadow:0 0 40px rgba(0,0,0,.45);

z-index:2;

}

h1{

font-size:38px;

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#d8d8d8;

margin-bottom:30px;

line-height:1.5;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

border-radius:12px;

font-size:16px;

}

button{

width:100%;

padding:16px;

font-size:18px;

border:none;

border-radius:12px;

cursor:pointer;

background:#7c3aed;

color:white;

transition:.3s;

}

button:hover{

transform:scale(1.03);

background:#9355ff;

}

.footer{

margin-top:25px;

text-align:center;

font-size:14px;

color:#cccccc;

}

</style>

</head>

<body>

<div class="stars"></div>

<div class="card">

<h1>🌙 AstroChubby</h1>

<p class="subtitle">

Yapay Zekâ Destekli Astroloji Platformu

</p>

<input type="date">

<input type="time">

<input placeholder="🌍 Doğum Şehri">

<button>

✨ Haritamı Oluştur

</button>

<div class="footer">

Yıldızlarını Keşfet, Yapay Zekâ ile Yorumla

</div>

</div>

</body>
</html>
